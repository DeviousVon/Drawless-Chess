# Fast 96-job paired/color-swapped matrix canary. Every cap is intentionally inconclusive.
schemaVersion=1
runLabel=canary-adjacent-matrix
jobSource=adjacent
enginePath=engine/native/upstream/Fairy-Stockfish/src/stockfish
variantsPath=engine/variants.ini
outputPath=build/selfplay/adjacent-canary
openingsPath=tools/selfplay/fixtures/openings.tsv
ladderLevelsPath=tools/selfplay/fixtures/ladder-levels.tsv
adjacentMatchupsPath=tools/selfplay/fixtures/adjacent-matchups.tsv
games=96
parallelGames=4
variant=drawless
deadPosition=material
fiftyMove=off
searchMode=nodes
nodes=500
maxPlies=12
pairColors=true
failFast=true
markCappedForContinuation=true
hashMb=16
handshakeTimeoutMillis=30000
readyTimeoutMillis=30000
searchTimeoutMillis=10000
stopGraceMillis=2000
quitTimeoutMillis=3000
