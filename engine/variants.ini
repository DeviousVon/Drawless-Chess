[drawless:chess]
# The side with no legal move loses, whether checked or merely stalemated.
stalemateValue = loss

# On the third occurrence, the side to move wins. Since the opponent made the
# move that completed the occurrence, this makes the completing player lose.
nFoldRule = 3
nFoldValue = win
# Keep the value relative to the side to move. After a player completes the
# third occurrence, their opponent is now to move and therefore wins.
nFoldValueAbsolute = false
# Patch-v1 search override: when every legal move completes occurrence three,
# the mover was forced and wins because the opponent created the cycle.
drawlessForcedRepetition = true

# Drawless Chess handles dead material and the 50-move policy in the app-level
# adjudicator because both outcomes are selectable.
nMoveRule = 0

[escape:drawless]
# Escape reverses only stalemate: the trapped side wins.
stalemateValue = win
